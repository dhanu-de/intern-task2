<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — To-Do List</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Dark Mode Toggle -->
  <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
    <span class="theme-icon">🌙</span>
  </button>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <h1 class="app-title">TaskFlow</h1>
        <p class="app-subtitle">Stay organised, one task at a time.</p>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-number" id="totalCount">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-number" id="completedCount">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-number" id="pendingCount">0</span>
          <span class="stat-label">Pending</span>
        </div>
      </div>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-wrapper">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="What needs to be done?"
          maxlength="120"
          autocomplete="off"
          aria-label="New task input"
        />
        <input
          type="datetime-local"
          id="taskStartInput"
          class="task-date-input"
          aria-label="Task start date and time"
        />
        <input
          type="datetime-local"
          id="taskEndInput"
          class="task-date-input"
          aria-label="Task end date and time"
        />
        <button class="add-btn" id="addBtn" aria-label="Add task">
          <span class="add-icon">+</span>
          <span class="add-text">Add</span>
        </button>
      </div>
      <p class="error-msg" id="errorMsg" role="alert"></p>
    </section>

    <!-- Filter Tabs -->
    <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>

    <!-- Task List -->
    <main class="task-list-section">
      <ul class="task-list" id="taskList" aria-live="polite" aria-label="Task list"></ul>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <p class="empty-title">All clear!</p>
        <p class="empty-sub">Add a task above to get started.</p>
      </div>
    </main>

    <!-- Footer Actions -->
    <footer class="app-footer">
      <p class="footer-datetime" id="footerDatetime"></p>
      <button class="clear-btn" id="clearCompleted">Clear completed</button>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
